appId: com.memora.app
---
- runFlow: ../auth/login.yaml
- tapOn:
    id: new-memory-fab
- extendedWaitUntil:
    visible: "New memory"
    timeout: 15000
- extendedWaitUntil:
    visible:
      id: new-memory-attach-media
    timeout: 10000
- tapOn:
    id: new-memory-attach-media
- tapOn: "Photo library"
- runFlow: ../shared/pick-first-image.yaml
- extendedWaitUntil:
    visible:
      id: new-memory-media-preview
    timeout: 15000
- tapOn:
    id: new-memory-save
- extendedWaitUntil:
    notVisible: "New memory"
    timeout: 15000
- extendedWaitUntil:
    visible:
      id: timeline-memory-list
    timeout: 30000
# Posting is deferred (pending-uploads queue): the composer closes before the
# upload finishes, so reaching the timeline no longer proves the save worked.
# The pending banner must clear on its own -- a failed post keeps the banner
# visible with a retry card, which makes this wait time out.
- extendedWaitUntil:
    notVisible:
      id: pending-memory-uploads-banner
    timeout: 60000
- assertNotVisible: "Couldn't post memory"
