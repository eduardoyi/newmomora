appId: com.memora.app
---
- launchApp:
    appId: com.memora.app
    clearState: true
    arguments:
      EXDevMenuIsOnboardingFinished: true
- tapOn:
    text: "Continue"
    optional: true
- tapOn:
    text: "Close"
    optional: true
- tapOn:
    text: "Momora"
    below: "RECENTLY OPENED"
    optional: true
- tapOn:
    text: "Momora"
    below: "DEVELOPMENT SERVERS"
    optional: true
- extendedWaitUntil:
    visible: "Welcome back"
    timeout: 90000
- tapOn:
    id: login-email-input
- inputText: ${REVIEWER_EMAIL}
- tapOn:
    id: login-submit-button
- extendedWaitUntil:
    visible: "Enter your password"
    timeout: 10000
- tapOn:
    id: password-input
- inputText: ${REVIEWER_PASSWORD}
- tapOn:
    id: password-submit-button
- extendedWaitUntil:
    visible: "Timeline"
    timeout: 90000
