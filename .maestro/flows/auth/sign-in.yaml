appId: com.momora.app
---
- tapOn:
    id: login-dev-toggle-button
- tapOn:
    id: login-email-input
- eraseText
- inputText: ${TEST_EMAIL}
- tapOn:
    id: login-password-input
- eraseText
- inputText: ${TEST_PASSWORD}
- tapOn:
    id: login-dev-submit-button
- assertNotVisible:
    text: "Invalid login credentials"
